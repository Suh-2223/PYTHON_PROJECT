<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attempt Exam</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
    color:white;
}


header{
    background:#0f172a;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,.4);
}

header h1{
    color:#60a5fa;
}


.timer{
    background:#ef4444;
    padding:12px 20px;
    border-radius:10px;
    font-size:18px;
}


.container{
    width:85%;
    margin:40px auto;
}


.question-box{

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    padding:25px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(59,130,246,.35);

}


.question-box h3{
    color:#93c5fd;
    margin-bottom:15px;
}


.option{
    margin:12px 0;
}


.submit-btn{

    background:#16a34a;
    color:white;
    padding:15px 35px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;

}


.submit-btn:hover{
    background:#15803d;
}


</style>

</head>


<body>


<header>

<h1>📝 {{ exam.title }}</h1>

<div class="timer">
Time Left: <span id="time">30:00</span>
</div>

</header>



<div class="container">


<form method="POST">

{% csrf_token %}


{% for question in questions %}

<h3>{{ question.question_text }}</h3>

        <input type="radio" name="{{ question.id }}" value="{{ question.option1 }}">
        {{ question.option1 }}<br>

        <input type="radio" name="{{ question.id }}" value="{{ question.option2 }}">
        {{ question.option2 }}<br>

        <input type="radio" name="{{ question.id }}" value="{{ question.option3 }}">
        {{ question.option3 }}<br>

        <input type="radio" name="{{ question.id }}" value="{{ question.option4 }}">
        {{ question.option4 }}<br><br>

    {% endfor %}




<button type="submit" class="submit-btn">
Submit Exam
</button>


</form>


</div>



<script>

let time = 1800;

let timer = setInterval(function(){

let minutes = Math.floor(time/60);
let seconds = time%60;

document.getElementById("time").innerHTML =
minutes + ":" + (seconds<10 ? "0":"") + seconds;


time--;


if(time < 0){

clearInterval(timer);
document.forms[0].submit();

}


},1000);


</script>


</body>
</html>
