<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Question</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b1120,#111827,#1e3a8a);
    padding-top: 60px;
    padding-bottom: 40px;
}

.card{
    width:550px;
    padding:35px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 0 30px rgba(37,99,235,.4);
}

.title{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:30px;

}

label{
    color:#93c5fd;
    display:block;
    margin-top:18px;
    margin-bottom:8px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    font-size:15px;
}

input:focus,
textarea:focus,
select:focus{
    outline:none;
    box-shadow:0 0 12px #3b82f6;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:25px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
    box-shadow:0 0 18px #3b82f6;
}

</style>
</head>

<body>

<div class="card">

<h2 class="title"> Add Question</h2>


<form method="POST">

{% csrf_token %}

<label>Select Exam</label>

<select name="exam">
{% for exam in exams %}
<option value="{{ exam.id }}">{{ exam.title }}</option>
{% endfor %}

</select>

<label>Question</label>
<textarea name="question_text" rows="3" placeholder="Enter Question" required></textarea>

<label>Option A</label>
<input type="text" name="option1" required>

<label>Option B</label>
<input type="text" name="option2" required>

<label>Option C</label>
<input type="text" name="option3" required>

<label>Option D</label>
<input type="text" name="option4" required>

<label>Correct Answer</label>
<select name="correct_answer" required>
<option value="">Select Correct Answer</option>
<option value="option1">Option A</option>
<option value="option2">Option B</option>
<option value="option3">Option C</option>
<option value="option4">Option D</option>
</select>

<button type="submit">
Save Question
</button>

</form>

</div>

</body>
</html>
