<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Exam</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:500px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:35px;
    box-shadow:0 0 30px rgba(37,99,235,.45);
}

h2{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:32px;
}

label{
    color:#93c5fd;
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-size:15px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    font-size:15px;
}

input:focus{
    outline:none;
    box-shadow:0 0 12px #3b82f6;
}

button{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
    box-shadow:0 0 18px #3b82f6;
}

</style>
</head>

<body>

<div class="card">

<h2 style="color: #60a5fa;">Create New Exam</h2>

<form method="POST">

{% csrf_token %}

<label>Exam Title</label>
<input type="text" name="title" placeholder="Enter Exam Title" required>

<label>Subject</label>
<input type="text" name="subject" placeholder="Enter Subject" required>

<label>Total Marks</label>
<input type="number" name="total_marks" placeholder="100" required>

<label>Duration (Minutes)</label>
<input type="number" name="duration" placeholder="60" required>

<button type="submit">
Create Exam
</button>

</form>

</div>

</body>
</html>
