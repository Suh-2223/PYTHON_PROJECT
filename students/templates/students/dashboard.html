<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
    color:white;
}

header{
    background:#0f172a;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,.4);
}

header h1{
    color:#60a5fa;
}

.logout{
    background:#ef4444;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
}

.container{
    width:90%;
    margin:40px auto;
}

h2{
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(59,130,246,.35);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h3{
    margin:20px 0;
    color:#93c5fd;
}

.card a{
    display:inline-block;
    margin-top:10px;
    padding:12px 25px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.card a:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<header>

<h1>🎓 Student Dashboard</h1>

<a href="{% url 'logout' %}" class="logout">
Logout
</a>

</header>


<div class="container">

<h2>Welcome {{request.user.username}} 👋</h2>


<div class="cards">


<div class="card">

<h1>📝</h1>

<h3>Available Exams</h3>

<p>View and attempt your exams</p>

<a href="{% url 'view_exams' %}">
Open
</a>

</div>


<div class="card">

<h1>📊</h1>

<h3>My Results</h3>

<p>Check your exam results</p>

<a href="{% url 'student_view_results' %}">
Open
</a>

</div>



</div>

</div>


</body>
</html>
