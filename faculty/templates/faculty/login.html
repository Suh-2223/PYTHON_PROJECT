<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f172a);
        }

        .login-box{
            width:400px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            box-shadow:0 0 25px rgba(0,0,0,0.5);
        }

        h2{
            color:white;
            text-align:center;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            text-align:center;
            margin-bottom:25px;
        }

        label{
            display:block;
            color:#60a5fa;
            margin-bottom:8px;
            margin-top:15px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#1e293b;
            color:white;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border:2px solid #3b82f6;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:25px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:scale(1.02);
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Faculty Login</h2>
    <p>Online Examination System</p>

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
<p>
    Don't have an account? <a href="{% url 'faculty_register' %}" style="color:#60a5fa;">Register here</a>
</p>
</div>


</body>
</html>
