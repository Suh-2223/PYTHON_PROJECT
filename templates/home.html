<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Examination System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}


.container{
    width:90%;
    max-width:900px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:60px 40px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(59,130,246,.4);
}


h1{
    font-size:48px;
    color:#60a5fa;
    margin-bottom:15px;
}


p{
    font-size:20px;
    color:#dbeafe;
    margin-bottom:40px;
}


.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}


.btn{
    text-decoration:none;
    padding:15px 35px;
    border-radius:10px;
    font-size:18px;
    color:white;
    transition:.3s;
}


.student{
    background:#2563eb;
}


.faculty{
    background:#16a34a;
}


.admin{
    background:#dc2626;
}


.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(255,255,255,.4);
}


footer{
    position:fixed;
    bottom:15px;
    color:#cbd5e1;
    font-size:14px;
}

</style>

</head>

<body>


<div class="container">

<h1>🎓 Online Examination System</h1>

<p>
Secure • Fast • Reliable Online Testing Platform
</p>


<div class="buttons">

<a href="/students/login/" class="btn student">
Student Login
</a>


<a href="/faculty/login/" class="btn faculty">
Faculty Login
</a>


<a href="/admin/" class="btn admin">
Admin Login
</a>


</div>

</div>


<footer>
© 2026 Online Examination System | Developed by You
</footer>


</body>
</html>
